<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Royal Source OS V2</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body id="desktop-area" role="application">

<div id="fps-counter" aria-live="polite"><span id="fps-val">60</span> FPS</div>

<dialog id="mobile-warning" aria-modal="true">
  <div class="mobile-box">
    <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
    <h2>Device is not fully supported</h2>
    <p>Double tap anywhere to continue</p>
  </div>
</dialog>

<div id="top-trigger" aria-hidden="true"></div>
<div id="bottom-trigger" aria-hidden="true"></div>

<main id="lock-screen" onclick="unlockSystem()" role="presentation">
  <video id="lock-video" autoplay loop muted playsinline aria-hidden="true"></video>
  <img id="lock-img" class="media__fallback" alt="Lockscreen Background">
  <article id="lock-ui">
    <div class="lock-content">
      <div class="l-day" id="lock-day-large">FRIDAY</div>
      <div class="l-date" id="lock-date">03 APRIL, 2026.</div>
      <div class="l-time" id="lock-time">- 08:43 -</div>
    </div>
  </article>
</main>

<!-- Royal Source Background - Plays once, no loop -->
<video id="bg-video" muted playsinline aria-hidden="true"></video>
<img id="bg-img" class="media__fallback" alt="Desktop Background">
<canvas id="snow-fx" aria-hidden="true"></canvas>

<header id="hud-top">
  <div class="hud-day" id="lbl-day">FRIDAY</div>
</header>

<!-- Right Sidebar -->
<aside id="right-sidebar" aria-label="Quick Access Widget">
  <section class="sidebar__section">
    <h3 class="sidebar__title">Jump Back In!</h3>
    <div class="sidebar__card" id="last-played-game" onclick="launchLastPlayed()" role="button" tabindex="0">
      <img id="last-game-icon" src="https://cdn-icons-png.flaticon.com/512/732/732244.png" alt="Game Icon">
      <div class="sidebar__info">
        <strong id="last-game-name">No Recent Game</strong>
        <small>PS5 Emu</small>
      </div>
    </div>
  </section>
  <section class="sidebar__section">
    <h3 class="sidebar__title">Quick Play</h3>
    <div class="sidebar__card" id="spotify-quick-play" onclick="resumeSpotify()" role="button" tabindex="0">
      <img id="spotify-album-art" src="https://cdn.pixabay.com/photo/2016/10/22/00/15/spotify-1759471_1280.jpg" alt="Album Cover">
      <div class="sidebar__info">
        <strong id="spotify-track-name">Not Playing</strong>
        <small>Spotify</small>
      </div>
      <i class="fas fa-play play-overlay" aria-hidden="true"></i>
    </div>
  </section>
  <section class="sidebar__section">
    <h3 class="sidebar__title">System Status</h3>
    <div class="sidebar__card update-card" onclick="openUpdateLog()" role="button" tabindex="0">
      <div class="sidebar__info">
        <strong class="txt-highlight">Update Log</strong>
        <small>View latest patches</small>
      </div>
      <i class="fas fa-chevron-right sidebar__chevron" aria-hidden="true"></i>
    </div>
  </section>
</aside>

<div id="drag-proxy" aria-hidden="true">
  <div id="folder-badge" class="hidden-badge">2</div>
  <img id="proxy-img" src="" alt="Dragging">
</div>

<nav id="dock-container" aria-label="System Taskbar"></nav>
<section id="windows-layer" aria-live="assertive"></section>

<!-- All modals, menus, Ciri, media player etc. remain the same (omitted for brevity) -->

<script src="script.js"></script>

<script>
// Set Royal Animation Background (plays once)
document.addEventListener('DOMContentLoaded', () => {
  const bgVideo = document.getElementById('bg-video');
  
  // Change this path if needed
  bgVideo.src = "Videos/royal-yinyang-crown.mov"; 
  bgVideo.muted = true;
  bgVideo.playsinline = true;
  // No loop
  
  bgVideo.play().catch(e => console.log("Background video autoplay prevented:", e));
});
</script>
</body>
</html>
